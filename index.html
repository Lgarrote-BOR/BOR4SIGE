        // Inyectar el menú lateral al cargar la página
        function renderNavigation() {
            const container = document.getElementById("nav-container");
            container.innerHTML = "";
            
            navGroups.forEach((group, groupIndex) => {
                const groupDiv = document.createElement("div");
                groupDiv.className = "space-y-1";
                groupDiv.setAttribute("data-group", group.title.toLowerCase());
                
                // Cabecera del Grupo (Colapsable)
                const header = document.createElement("div");
                header.className = "flex items-center justify-between px-3 py-1.5 text-xs font-bold text-primary hover:bg-surface-container-low rounded-lg cursor-pointer transition-colors";
                header.onclick = () => toggleGroup(groupIndex);
                header.innerHTML = `
                    <div class="flex items-center gap-2">
                        <span class="material-symbols-outlined text-base">${group.icon}</span>
                        <span>${group.title}</span>
                    </div>
                    <span id="arrow-${groupIndex}" class="material-symbols-outlined text-sm transition-transform duration-200">expand_less</span>
                `;
                
                // Lista de enlaces del grupo
                const list = document.createElement("ul");
                list.id = `group-list-${groupIndex}`;
                list.className = "pl-2 space-y-0.5 mt-0.5 transition-all duration-200 overflow-hidden";
                
                group.items.forEach(item => {
                    const listItem = document.createElement("li");
                    listItem.className = "nav-item";
                    listItem.setAttribute("data-name", item.name.toLowerCase());
                    
                    const link = document.createElement("a");
                    link.href = "#";
                    link.setAttribute("data-path", item.path);
                    link.onclick = (e) => {
                        e.preventDefault();
                        loadPage(item.path, link);
                    };
                    link.className = "flex items-center gap-2.5 px-3 py-2 text-xs font-semibold rounded-lg text-on-surface-variant hover:bg-surface-container-low hover:text-primary transition-all duration-150 active:scale-[0.98]";
                    link.innerHTML = `
                        <span class="material-symbols-outlined text-[15px]">${item.icon}</span>
                        <span>${item.name}</span>
                    `;
                    
                    listItem.appendChild(link);
                    list.appendChild(listItem);
                });
                
                groupDiv.appendChild(header);
                groupDiv.appendChild(list);
                container.appendChild(groupDiv);
            });
            
            // Marcar por defecto la primera opción (Dashboard) como activa
            const firstLink = document.querySelector("#group-list-0 a");
            if (firstLink) {
                firstLink.classList.add("bg-surface-container-high", "text-primary");
                firstLink.classList.remove("text-on-surface-variant");
            }
        }

        // Permitir la navegación desde los sub-iframes a módulos concretos del padre
        window.navigateToPath = function(path) {
            const cleanPath = path.replace(/^\.\//, ''); // normalizar ruta
            const links = document.querySelectorAll("#nav-container a");
            for (let link of links) {
                const linkPath = link.getAttribute("data-path") || '';
                const cleanLinkPath = linkPath.replace(/^\.\//, '');
                if (cleanLinkPath === cleanPath) {
                    loadPage(linkPath, link);
                    
                    // Asegurar que el grupo contenedor esté expandido si estaba colapsado
                    const parentUl = link.closest("ul");
                    if (parentUl && parentUl.style.maxHeight === "0px") {
                        const groupIndex = parentUl.id.replace("group-list-", "");
                        toggleGroup(groupIndex);
                    }
                    return true;
                }
            }
            return false;
        };

        // Colapsar/Expandir grupos
        function toggleGroup(index) {
            const list = document.getElementById(`group-list-${index}`);
            const arrow = document.getElementById(`arrow-${index}`);
            if (list.style.maxHeight === "0px") {
                list.style.maxHeight = "500px";
                arrow.style.transform = "rotate(0deg)";
            } else {
                list.style.maxHeight = "0px";
                arrow.style.transform = "rotate(-180deg)";
            }
        }

        // Cargar página en el Iframe
        function loadPage(path, activeLinkElement) {
            const iframe = document.getElementById("content-iframe");
            iframe.src = path;

            // Desmarcar todos los enlaces activos
            document.querySelectorAll("#nav-container a").forEach(link => {
                link.classList.remove("bg-surface-container-high", "text-primary");
                link.classList.add("text-on-surface-variant");
            });

            // Marcar el enlace actual como activo
            activeLinkElement.classList.add("bg-surface-container-high", "text-primary");
            activeLinkElement.classList.remove("text-on-surface-variant");

            // Cerrar menú lateral en pantallas móviles
            if (window.innerWidth < 768) {
                toggleMobileSidebar();
            }
        }

        // Buscador interactivo en tiempo real
        function filterModules(query) {
            const cleanQuery = query.toLowerCase().trim();
            const groups = document.querySelectorAll("#nav-container > div");
            
            groups.forEach(groupDiv => {
                const listItems = groupDiv.querySelectorAll("li.nav-item");
                let groupHasMatch = false;

                listItems.forEach(item => {
                    const name = item.getAttribute("data-name");
                    if (name.includes(cleanQuery)) {
                        item.classList.remove("hidden");
                        groupHasMatch = true;
                    } else {
                        item.classList.add("hidden");
                    }
                });

                if (groupHasMatch) {
                    groupDiv.classList.remove("hidden");
                } else {
                    groupDiv.classList.add("hidden");
                }
            });
        }

        // Toggle del menú en responsive (Móviles)
        function toggleMobileSidebar() {
            const sidebar = document.getElementById("sidebar");
            const overlay = document.getElementById("sidebar-overlay");

            if (sidebar.classList.contains("hidden")) {
                sidebar.classList.remove("hidden");
                sidebar.classList.add("fixed", "left-0", "top-0", "bottom-0");
                overlay.classList.remove("hidden");
            } else {
                sidebar.classList.add("hidden");
                sidebar.classList.remove("fixed", "left-0", "top-0", "bottom-0");
                overlay.classList.add("hidden");
            }
        }

        // API Sync & Local Storage Fallback
        window.sigDbState = {};
        window.isServerActive = false;

        window.saveKeyToServer = function(key, value) {
            if (value === null) {
                delete window.sigDbState[key];
            } else {
                window.sigDbState[key] = value;
            }

            if (window.isServerActive) {
                fetch('/api/store', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key, value })
                }).catch(err => console.error("Error al guardar en el servidor:", err));
            } else {
                // Fallback para mantener sincronizados los iframes en local
                if (value === null) {
                    localStorage.removeItem(key);
                } else {
                    localStorage.setItem(key, value);
                }
            }
        };

        function toggleProfileDropdown() {
            const dropdown = document.getElementById("profile-dropdown");
            dropdown.classList.toggle("hidden");
        }

        // Cerrar dropdown al hacer click fuera
        document.addEventListener("click", (e) => {
            const container = document.getElementById("profile-menu-btn");
            const dropdown = document.getElementById("profile-dropdown");
            if (container && dropdown && !container.contains(e.target) && !dropdown.contains(e.target)) {
                dropdown.classList.add("hidden");
            }
        });

        function renderUserProfile() {
            const currentUserStr = window.sigDbState['sig_current_user'];
            if (!currentUserStr) return;

            let currentUser;
            try {
                currentUser = typeof currentUserStr === 'string' ? JSON.parse(currentUserStr) : currentUserStr;
            } catch(e) {
                console.error("Error al parsear usuario activo:", e);
                return;
            }

            // Actualizar avatar e información
            const initials = currentUser.name.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
            document.getElementById("user-avatar-initials").innerText = initials;
            document.getElementById("user-display-name").innerText = currentUser.name;
            document.getElementById("user-display-role").innerText = currentUser.role + (currentUser.isSuperadmin ? " ⭐" : "");

            // Cargar lista de usuarios simulados
            const usersList = document.getElementById("simulated-users-list");
            if (!usersList) return;
            usersList.innerHTML = "";

            const allUsersStr = window.sigDbState['sig_users'];
            if (allUsersStr) {
                try {
                    const allUsers = typeof allUsersStr === 'string' ? JSON.parse(allUsersStr) : allUsersStr;
                    allUsers.forEach(user => {
                        const item = document.createElement("button");
                        item.className = "w-full text-left px-3 py-1.5 hover:bg-surface-container-high flex items-center justify-between transition-colors text-xs";
                        item.onclick = () => {
                            switchUser(user);
                        };

                        const isCurrent = user.id === currentUser.id;
                        item.innerHTML = `
                            <div class="text-left min-w-0 flex-1">
                                <p class="text-xs font-bold truncate ${isCurrent ? 'text-primary' : 'text-on-surface'}">${user.name} ${user.isSuperadmin ? '⭐' : ''}</p>
                                <p class="text-[9px] text-on-surface-variant truncate">${user.role} (${user.tenantId.toUpperCase()})</p>
                            </div>
                            ${isCurrent ? '<span class="material-symbols-outlined text-secondary text-base shrink-0 ml-1">check</span>' : ''}
                        `;
                        usersList.appendChild(item);
                    });
                } catch(e) {
                    console.error("Error al parsear lista de usuarios:", e);
                }
            }
        }

        function switchUser(user) {
            window.saveKeyToServer('sig_current_user', typeof user === 'string' ? user : JSON.stringify(user));
            
            // Si el usuario no es superadmin, forzar el tenant de ese usuario
            if (!user.isSuperadmin) {
                window.saveKeyToServer('sig_active_tenant', user.tenantId);
            }

            // Recargar UI
            renderUserProfile();
            
            // Recargar el iframe para que el módulo activo note el cambio de permisos
            const iframe = document.getElementById("content-iframe");
            iframe.src = iframe.src;

            // Ocultar dropdown
            document.getElementById("profile-dropdown").classList.add("hidden");
        }

        async function initApp() {
            renderNavigation();
            const iframe = document.getElementById("content-iframe");
            
            try {
                const response = await fetch('/api/store');
                if (response.ok) {
                    window.sigDbState = await response.json();
                    window.isServerActive = true;
                    console.log("SGI 2.0 Webapp: Estado cargado desde el servidor.");
                } else {
                    throw new Error("El servidor no devolvió un estado válido.");
                }
            } catch (err) {
                console.warn("SGI 2.0 Local: Servidor inactivo. Usando localStorage como fallback:", err);
                window.sigDbState = {};
                window.isServerActive = false;
                
                // Cargar el localStorage en la memoria compartida de la sesión
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key.startsWith('sig_')) {
                        window.sigDbState[key] = localStorage.getItem(key);
                    }
                }
            }

            // Inicializar lista de usuarios si no existe
            if (!window.sigDbState['sig_users']) {
                const seedUsers = [
                    { id: "bor", name: "Bor", email: "bor@bor4d.com", role: "Superadministrador", department: "Dirección", tenantId: "alfa", status: "Activo", isSuperadmin: true },
                    { id: "ana", name: "Ana Rodríguez Silva", email: "a.rodriguez@bor4d.com", role: "Quality Manager", department: "Calidad ISO 9001", tenantId: "alfa", status: "Activo", isSuperadmin: false },
                    { id: "carlos", name: "Carlos Gómez Pérez", email: "c.gomez@bor4d.com", role: "Auditor Interno", department: "Cumplimiento", tenantId: "beta", status: "Activo", isSuperadmin: false },
                    { id: "laura", name: "Laura Martínez", email: "l.martinez@bor4d.com", role: "Especialista Medioambiental", department: "Medio Ambiente ISO 14001", tenantId: "alfa", status: "Inactivo", isSuperadmin: false }
                ];
                window.saveKeyToServer('sig_users', JSON.stringify(seedUsers));
            }

            // Inicializar usuario actual si no existe
            if (!window.sigDbState['sig_current_user']) {
                let uSeed = JSON.parse(window.sigDbState['sig_users']);
                window.saveKeyToServer('sig_current_user', JSON.stringify(uSeed[0]));
            }

            renderUserProfile();

            // Cargar página inicial
            iframe.src = "./dashboard_de_gesti_n_sig/code.html";
        }

        // Iniciar
        document.addEventListener("DOMContentLoaded", () => {
            initApp();
        });
    </script>
</body>
</html>
