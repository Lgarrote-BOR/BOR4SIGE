server {
    listen 80;
    listen [::]:80;
    server_name bor4sige.tudominio.com;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bor4sige.tudominio.com;

    # ── SSL (Certbot / Let's Encrypt) ──
    ssl_certificate     /etc/letsencrypt/live/bor4sige.tudominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bor4sige.tudominio.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # ── Root ──
    root /var/www/bor4sige;
    index index.html;

    # ── Cache static assets ──
    location ~* \.(html|css|js|jpg|png|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # ── Security headers ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ── Gzip compression ──
    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Logs ──
    access_log /var/log/nginx/bor4sige_access.log;
    error_log  /var/log/nginx/bor4sige_error.log;
}
