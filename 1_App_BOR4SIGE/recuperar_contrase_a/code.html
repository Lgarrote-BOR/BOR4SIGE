</div>
<input class="block w-full pl-[40px] pr-sm py-sm font-body-md text-body-md bg-surface border border-outline-variant rounded focus:ring-secondary focus:border-secondary transition-colors" id="email" name="email" placeholder="usuario@bor4d.com" required="" type="email"/>
</div>
</div>
